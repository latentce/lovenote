name: Backend acceptance

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lovenote-backend-acceptance
  cancel-in-progress: false

jobs:
  acceptance:
    runs-on: ubuntu-latest
    environment: acceptance
    env:
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      E2E_MEMBER_PASSWORD: ${{ secrets.E2E_MEMBER_PASSWORD }}
      E2E_MEMBER_USERNAME: ${{ vars.E2E_MEMBER_USERNAME }}
      E2E_MUTATIONS: "1"
      E2E_OWNER_PASSWORD: ${{ secrets.E2E_OWNER_PASSWORD }}
      E2E_OWNER_USERNAME: ${{ vars.E2E_OWNER_USERNAME }}
      E2E_UPLOADS: "1"
      INTEGRATION_DATABASE_URL: ${{ secrets.INTEGRATION_DATABASE_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_ACCOUNT_ID: ${{ vars.R2_ACCOUNT_ID }}
      R2_BUCKET_NAME: lovenote-media-test
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      SETUP_SECRET: ${{ secrets.SETUP_SECRET }}
      SITE_URL: http://127.0.0.1:4321
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:integration
      - run: pnpm db:migrate
      - run: pnpm test:acceptance
